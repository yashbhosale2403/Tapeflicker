{% extends 'manager/base.html' %}

{% block header_title %}{{ title }}{% endblock %}

{% block content %}
<div class="min-h-[50vh] flex items-center justify-center">
    <div class="text-center">
        <div class="w-20 h-20 bg-mainpanel border border-mainborder rounded-2xl flex items-center justify-center mx-auto mb-6 text-mainmuted">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
        </div>
        <h2 class="text-2xl font-bold text-white mb-2">{{ title }} Module</h2>
        <p class="text-mainmuted max-w-sm mx-auto">This module is currently under construction. Please check back later.</p>
        <a href="{% url 'manager:dashboard' %}" class="inline-block mt-8 text-mainaccent hover:text-white transition">← Back to Dashboard</a>
    </div>
</div>
{% endblock %}

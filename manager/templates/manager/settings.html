{% extends 'manager/base.html' %}

{% block header_title %}System Settings{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <div class="glass-panel p-8 rounded-xl border border-mainborder">
        <h3 class="text-sm font-semibold text-white uppercase tracking-wider mb-6">Global Platform Configurations</h3>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-medium text-mainmuted mb-2">Platform Name</label>
                <input type="text" name="site_name" value="{{ setting.site_name }}" required class="w-full px-4 py-3 bg-mainbg border border-mainborder rounded-lg text-sm text-maintext focus:outline-none focus:border-mainaccent transition-colors">
            </div>

            <div>
                <label class="block text-sm font-medium text-mainmuted mb-2">Support Contact Email</label>
                <input type="email" name="contact_email" value="{{ setting.contact_email }}" required class="w-full px-4 py-3 bg-mainbg border border-mainborder rounded-lg text-sm text-maintext focus:outline-none focus:border-mainaccent transition-colors">
            </div>

            <div class="flex items-center justify-between border-t border-mainborder pt-6">
                <div>
                    <h4 class="text-sm font-medium text-white">Maintenance Mode</h4>
                    <p class="text-xs text-mainmuted">If active, guest users will be redirected to a temporary holding page.</p>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" name="maintenance_mode" {% if setting.maintenance_mode %}checked{% endif %} class="sr-only peer">
                    <div class="w-11 h-6 bg-mainbg peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-mainmuted after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-mainaccent peer-checked:after:bg-mainbg border border-mainborder"></div>
                </label>
            </div>

            <div class="flex justify-end pt-6 border-t border-mainborder gap-4">
                <button type="submit" class="px-6 py-2.5 rounded-lg bg-gradient-to-r from-mainaccent to-mainpurple text-mainbg font-bold hover:shadow-[0_0_15px_rgba(0,217,255,0.3)] transition-all text-sm">
                    Save System Settings
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
